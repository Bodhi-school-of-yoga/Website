# Alternative Amplify configuration with environment variable support
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 18
        - corepack enable
        - corepack prepare pnpm@9.0.0 --activate
        - pnpm config set store-dir ~/.pnpm-store
    build:
      commands:
        - pnpm install --frozen-lockfile
        - pnpm build:web
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/.cache/turbo
      - .pnpm-store
