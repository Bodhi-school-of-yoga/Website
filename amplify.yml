version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 24
            - cd ../..
            - corepack enable
            - corepack prepare pnpm@11.1.0 --activate
            - pnpm config set store-dir .pnpm-store
        build:
          commands:
            - export CI=true
            - pnpm install --frozen-lockfile
            - pnpm build:web
            - cd apps/web
            - mkdir -p .next/standalone/apps/web/.next/static
            - cp -r .next/static/* .next/standalone/apps/web/.next/static/ || true
            - mkdir -p .next/standalone/apps/web/public
            - cp -r public/* .next/standalone/apps/web/public/ || true
            - cd ../..
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/.cache/turbo
          - ../../.pnpm-store
      customHeaders:
        - pattern: '**/*'
          headers:
            - key: Cache-Control
              value: public, max-age=0, must-revalidate
        - pattern: '**/*.js'
          headers:
            - key: Cache-Control
              value: public, max-age=31536000, immutable
        - pattern: '**/*.css'
          headers:
            - key: Cache-Control
              value: public, max-age=31536000, immutable
