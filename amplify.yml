version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24
        - corepack enable
        - corepack prepare pnpm@11.1.0 --activate
        - pnpm config set store-dir .pnpm-store
    build:
      commands:
        - pnpm install --frozen-lockfile
        - pnpm build:web
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/.cache/turbo
      - .pnpm-store
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: public, max-age=0, must-revalidate
    - pattern: '**/*.js'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
    - pattern: '**/*.css'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
