version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 24
            - npm install -g pnpm@11.1.0
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm run build:web
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - 'apps/web/.next/cache/**/*'
