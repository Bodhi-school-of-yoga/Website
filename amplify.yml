version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 24
            - npm install -g pnpm@11.1.0
            - pnpm install
        build:
          commands:
            - pnpm run build:web
            - cp -r node_modules apps/web/.next/standalone/
            - cp -r apps/web/node_modules apps/web/.next/standalone/apps/web/
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - 'apps/web/.next/cache/**/*'
